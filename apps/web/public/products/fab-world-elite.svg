<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 214" width="340" height="214">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2a42"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.06)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.02)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Card body -->
  <rect width="340" height="214" rx="16" fill="url(#bg)"/>
  <rect width="340" height="214" rx="16" fill="url(#shine)"/>
  <!-- Subtle decorative arc -->
  <ellipse cx="340" cy="214" rx="200" ry="120" fill="rgba(255,255,255,0.02)"/>
  <!-- Chip -->
  <rect x="32" y="80" width="45" height="34" rx="6" fill="#c9a84c" opacity="0.85"/>
  <line x1="32" y1="92" x2="77" y2="92" stroke="#b8943e" stroke-width="0.8"/>
  <line x1="32" y1="100" x2="77" y2="100" stroke="#b8943e" stroke-width="0.8"/>
  <line x1="54" y1="80" x2="54" y2="114" stroke="#b8943e" stroke-width="0.8"/>
  <!-- Bank name -->
  <text x="32" y="42" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="white" letter-spacing="0.5">FAB</text>
  <!-- Card name -->
  <text x="32" y="62" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="rgba(255,255,255,0.8)" letter-spacing="0.5">World Elite</text>
  <!-- Card number -->
  <text x="32" y="148" font-family="'Courier New', monospace" font-size="16" fill="white" letter-spacing="3">XXXX  XXXX  XXXX  XXXX</text>
  <!-- Valid thru -->
  <text x="32" y="175" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="rgba(255,255,255,0.55)" letter-spacing="0.5">VALID THRU</text>
  <text x="32" y="190" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="rgba(255,255,255,0.8)">XX/XX</text>
  <!-- Cardholder -->
  <text x="140" y="190" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="rgba(255,255,255,0.8)" letter-spacing="1">CARDHOLDER NAME</text>
  <!-- Mastercard-style circles -->
  <circle cx="284" cy="38" r="18" fill="#eb001b" opacity="0.85"/>
  <circle cx="308" cy="38" r="18" fill="#f79e1b" opacity="0.85"/>
  <circle cx="296" cy="38" r="18" fill="#ff5f00" opacity="0.5"/>
</svg>