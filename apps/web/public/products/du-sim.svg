<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 100" width="160" height="100">
  <defs>
    <linearGradient id="duBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a044e0"/>
      <stop offset="100%" stop-color="#8b2fc9"/>
    </linearGradient>
    <linearGradient id="duChip" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8d5a0"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>
  </defs>

  <!-- Card body -->
  <rect width="160" height="100" rx="12" ry="12" fill="url(#duBg)"/>

  <!-- Subtle diagonal pattern lines -->
  <line x1="0" y1="100" x2="60" y2="0" stroke="rgba(255,255,255,0.06)" stroke-width="20"/>
  <line x1="40" y1="100" x2="100" y2="0" stroke="rgba(255,255,255,0.04)" stroke-width="20"/>
  <line x1="90" y1="100" x2="150" y2="0" stroke="rgba(255,255,255,0.03)" stroke-width="20"/>

  <!-- SIM chip -->
  <rect x="18" y="28" width="32" height="24" rx="4" ry="4" fill="url(#duChip)"/>
  <!-- Chip circuit lines -->
  <line x1="34" y1="28" x2="34" y2="52" stroke="#b8922e" stroke-width="0.7"/>
  <line x1="18" y1="40" x2="50" y2="40" stroke="#b8922e" stroke-width="0.7"/>
  <rect x="26" y="34" width="16" height="12" rx="2" fill="none" stroke="#b8922e" stroke-width="0.7"/>
  <line x1="26" y1="34" x2="22" y2="30" stroke="#b8922e" stroke-width="0.5"/>
  <line x1="42" y1="34" x2="46" y2="30" stroke="#b8922e" stroke-width="0.5"/>
  <line x1="26" y1="46" x2="22" y2="50" stroke="#b8922e" stroke-width="0.5"/>
  <line x1="42" y1="46" x2="46" y2="50" stroke="#b8922e" stroke-width="0.5"/>

  <!-- du wordmark -->
  <text x="100" y="50" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="-1">du</text>

  <!-- 5G badge -->
  <rect x="118" y="12" width="28" height="14" rx="7" fill="rgba(255,255,255,0.2)"/>
  <text x="132" y="22.5" font-family="Arial, Helvetica, sans-serif" font-size="8" font-weight="700" fill="#ffffff" text-anchor="middle">5G</text>

  <!-- eSIM label -->
  <text x="18" y="18" font-family="Arial, Helvetica, sans-serif" font-size="7" fill="rgba(255,255,255,0.6)" letter-spacing="1.5">eSIM</text>

  <!-- Bottom info -->
  <text x="18" y="82" font-family="Arial, Helvetica, sans-serif" font-size="6.5" fill="rgba(255,255,255,0.5)">UAE Mobile Plan</text>
  <text x="18" y="92" font-family="Arial, Helvetica, sans-serif" font-size="5.5" fill="rgba(255,255,255,0.35)">du.ae</text>

  <!-- Signal bars bottom-right -->
  <g transform="translate(130, 74)" opacity="0.4">
    <rect x="0" y="12" width="3" height="6" rx="0.5" fill="#fff"/>
    <rect x="5" y="9" width="3" height="9" rx="0.5" fill="#fff"/>
    <rect x="10" y="5" width="3" height="13" rx="0.5" fill="#fff"/>
    <rect x="15" y="0" width="3" height="18" rx="0.5" fill="#fff"/>
  </g>
</svg>